<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            height: 100vh;

        }

        .login-card {
            border: none;
            border-radius: 20px;
        }

        .login-title {
            font-weight: bold;
            color: #0d6efd;
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
        }

        .btn-login {
            height: 50px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
        }

    </style>

</head>
<body>

<div class="container h-100">

    <div class="row h-100 justify-content-center align-items-center">

        <div class="col-md-4">

            <div class="card shadow-lg login-card">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4 login-title">
                        LOGIN
                    </h2>

                    <form action="/login" method="post">

                        <!-- USERNAME -->

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   placeholder="Enter username">

                            <div class="text-danger mt-1"
                                 th:if="${usernameError}"
                                 th:text="${usernameError}">
                            </div>

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Enter password">

                            <div class="text-danger mt-1"
                                 th:if="${passwordError}"
                                 th:text="${passwordError}">
                            </div>

                        </div>

                        <!-- LOGIN ERROR -->

                        <div class="alert alert-danger"
                             th:if="${error}"
                             th:text="${error}">
                        </div>

                        <!-- BUTTON -->

                        <button type="submit"
                                class="btn btn-primary w-100 btn-login">

                            Login

                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <a href="/register"
                           class="text-decoration-none">

                            Chưa có tài khoản?

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
