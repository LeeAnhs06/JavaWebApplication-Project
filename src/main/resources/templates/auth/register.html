<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            height: 100vh;
            background: #f4f7fb;
        }

        .register-card {
            border: none;
            border-radius: 20px;
        }

        .register-title {
            font-weight: bold;
            color: #0d6efd;
        }

    </style>

</head>
<body>

<div class="container h-100">

    <div class="row h-100 justify-content-center align-items-center">

        <div class="col-md-5">

            <div class="card shadow-lg register-card">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4 register-title">
                        REGISTER
                    </h2>

                    <form action="/register"
                          method="post">

                        <!-- USERNAME -->

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   placeholder="Enter username">

                            <small class="text-danger"
                                   th:text="${usernameError}">
                            </small>

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Enter password">

                            <small class="text-danger"
                                   th:text="${passwordError}">
                            </small>

                        </div>

                        <!-- CONFIRM PASSWORD -->

                        <div class="mb-4">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input type="password"
                                   name="confirmPassword"
                                   class="form-control"
                                   placeholder="Confirm password">

                            <small class="text-danger"
                                   th:text="${confirmError}">
                            </small>

                        </div>

                        <!-- BUTTON -->

                        <button type="submit"
                                class="btn btn-primary w-100">

                            Create Account

                        </button>

                    </form>

                    <!-- ERROR -->

                    <p class="text-danger text-center mt-3"
                       th:text="${error}">
                    </p>

                    <!-- SUCCESS -->

                    <p class="text-success text-center mt-3"
                       th:text="${success}">
                    </p>

                    <!-- LOGIN -->

                    <div class="text-center mt-3">

                        <a href="/login"
                           class="text-decoration-none">

                            Đã có tài khoản?

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
