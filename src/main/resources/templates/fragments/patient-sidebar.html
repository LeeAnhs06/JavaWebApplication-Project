<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="sidebar">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        .patient-sidebar {
            width: 260px;
            height: 100vh;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
            padding: 25px;
            overflow-y: auto;
        }

        .patient-sidebar h2 {
            color: white;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .patient-sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: 0.3s;
            font-size: 18px;
            font-weight: 500;
            white-space: nowrap;
        }

        .patient-sidebar a:hover {
            background: white;
            color: #0d6efd;
        }

        .patient-sidebar i {
            width: 28px;
        }

    </style>

    <div class="patient-sidebar">

        <h2>PATIENT</h2>

        <a href="/patient/profile">
            <i class="fa-solid fa-user"></i>
            Hồ sơ cá nhân
        </a>

        <!-- ĐÃ GỘP: đặt + hủy lịch trên cùng 1 trang -->
        <a href="/patient/appointments">
            <i class="fa-solid fa-calendar-check"></i>
            Đặt / Hủy lịch khám
        </a>

        <a href="/patient/history">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Lịch sử bệnh án
        </a>

        <a href="/logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>

    </div>

</div>

</html>
