<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Admin Sidebar</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

<div th:fragment="sidebar">

    <style>
        .admin-sidebar{
            width:250px;
            height:100vh;
            background:#000;
            padding:25px;
            box-sizing:border-box;
            overflow-y:auto;
        }

        .admin-sidebar h3{
            color:#fff;
            font-weight:bold;
            margin-bottom:40px;
        }

        .admin-sidebar a{
            display:block;
            color:#fff;
            text-decoration:none;
            padding:12px 15px;
            border-radius:10px;
            margin-bottom:12px;
            transition:0.3s;
            font-weight:500;
            white-space:nowrap;
        }

        .admin-sidebar a:hover{
            background:#fff;
            color:#0d6efd;
        }

        .admin-sidebar i{
            width:26px;
        }
    </style>

    <div class="admin-sidebar">

        <h3>ADMIN</h3>

        <a href="/admin/dashboard">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>

        <a href="/admin/profile">
            <i class="fa-solid fa-user"></i>
            Quản lý hồ sơ
        </a>

        <a href="/admin/test-types">
            <i class="fa-solid fa-vials"></i>
            Loại xét nghiệm
        </a>

        <a href="/admin/medicines">
            <i class="fa-solid fa-capsules"></i>
            Danh mục thuốc
        </a>

        <a href="/admin/prescriptions">
            <i class="fa-solid fa-prescription-bottle-medical"></i>
            Cấp phát thuốc
        </a>

        <a href="/logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>

    </div>

</div>

</body>
</html>
