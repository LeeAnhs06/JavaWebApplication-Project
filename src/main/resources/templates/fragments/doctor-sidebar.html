<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="sidebar">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>
        .doctor-sidebar {
            width: 260px;
            height: 100vh;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
            padding: 25px;
            overflow-y: auto;
        }

        .doctor-sidebar h2 {
            color: white;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .doctor-sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: 0.3s;
            font-size: 18px;
            font-weight: 500;
            white-space: nowrap;
        }

        .doctor-sidebar a:hover {
            background: white;
            color: #0d6efd;
        }

        .doctor-sidebar i {
            width: 28px;
        }
    </style>

    <div class="doctor-sidebar">

        <h2>DOCTOR</h2>

        <a href="/doctor/dashboard">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>

        <a href="/doctor/profile">
            <i class="fa-solid fa-user"></i>
            Hồ sơ cá nhân
        </a>

        <a href="/doctor/appointments">
            <i class="fa-solid fa-bed"></i>
            Bệnh nhân chờ khám
        </a>

        <a href="/doctor/prescriptions">
            <i class="fa-solid fa-capsules"></i>
            Cấp phát thuốc
        </a>

        <a href="/logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>

    </div>

</div>

</html>
