<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử khám bệnh</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            background: #f4f7fb;
        }

        .sidebar-wrapper {
            position: fixed;
            width: 260px;
            height: 100vh;
            left: 0;
            top: 0;
        }

        .main-content {
            margin-left: 260px;
            padding: 40px;
        }

        .card {
            border: none;
            border-radius: 20px;
        }

    </style>

</head>
<body>

<div class="sidebar-wrapper">

    <div th:replace="~{fragments/patient-sidebar :: sidebar}">
    </div>

</div>

<div class="main-content">

    <div class="card shadow p-5">

        <h2 class="text-primary mb-4">
            Lịch sử khám bệnh
        </h2>

        <table class="table table-bordered">

            <thead>

            <tr>

                <th>ID</th>

                <th>Ngày khám</th>

                <th>Chẩn đoán</th>

                <th>Chi tiết</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="r : ${records}">

                <td th:text="${r.id}"></td>

                <td th:text="${r.appointment.appointmentDate}"></td>

                <td th:text="${r.diagnosis}"></td>

                <td>

                    <a th:href="@{/patient/history/{id}(id=${r.id})}"
                       class="btn btn-primary btn-sm">

                        Xem chi tiết

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
