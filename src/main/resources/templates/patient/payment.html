<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body style="background:#f4f7fb;">

<div class="container py-5">

    <div class="card shadow p-4 mx-auto" style="max-width: 720px; border-radius:20px;">
        <h2 class="text-primary mb-3">Thanh toán đặt lịch</h2>

        <div class="alert alert-warning mb-4">
            Lưu ý: Bạn cần <b>xác nhận thanh toán</b> để lịch chuyển sang trạng thái chờ khám.
        </div>

        <div class="row g-4 align-items-center">

            <div class="col-md-7">
                <p class="mb-2">
                    <b>Mã lịch:</b> <span th:text="${appointment.id}"></span>
                </p>
                <p class="mb-2">
                    <b>Bác sĩ:</b> <span th:text="${appointment.doctor.fullName}"></span>
                </p>
                <p class="mb-2">
                    <b>Ngày khám:</b> <span th:text="${appointment.appointmentDate}"></span>
                </p>
                <p class="mb-2">
                    <b>Giờ khám:</b> <span th:text="${appointment.appointmentTime}"></span>
                </p>

                <hr>

                <h4 class="text-danger mb-3">
                    Số tiền: <span th:text="${amount}"></span> VND
                </h4>

                <form method="post"
                      th:action="@{/patient/payment/confirm/{id}(id=${appointment.id})}">
                    <button type="submit" class="btn btn-success">
                        Xác nhận thanh toán
                    </button>

                    <a href="/patient/appointments" class="btn btn-secondary ms-2">
                        Quay lại
                    </a>
                </form>
            </div>

            <div class="col-md-5 text-center">
                <div class="mb-2 fw-semibold">Quét QR để thanh toán</div>
                <img th:src="${qrUrl}" alt="QR Code" class="img-fluid border rounded p-2 bg-white">
                <div class="text-muted mt-2" style="font-size: 14px;">
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
