<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body {
            background: #f4f7fb;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .sidebar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            z-index: 1000;
            overflow-y: auto;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            min-height: 100vh;
        }

        .profile-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .profile-title {
            color: #0d6efd;
            font-weight: bold;
        }

        .form-control,
        .form-select {
            height: 50px;
            border-radius: 12px;
            border: 1px solid #dee2e6;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }

        .btn-primary {
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .form-label {
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        @media (max-width: 992px) {
            .sidebar-wrapper {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }

            .form-control,
            .form-select {
                height: 45px;
            }

            .btn-primary {
                width: 100%;
            }
        }

    </style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar-wrapper">
    <div th:replace="~{fragments/patient-sidebar :: sidebar}"></div>
</div>

<!-- CONTENT -->
<div class="main-content">

    <div class="card shadow profile-card">

        <div class="card-body p-5">

            <h2 class="profile-title mb-4">
                Hồ sơ cá nhân
            </h2>

            <form action="/patient/profile/update"
                  method="post">

                <!-- FULL NAME -->
                <div class="mb-3">

                    <label class="form-label">
                        Họ và tên
                    </label>

                    <input type="text"
                           name="fullName"
                           class="form-control"
                           th:value="${user.fullName}">

                </div>

                <!-- EMAIL -->
                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           th:value="${user.email}">

                </div>

                <!-- BIRTH DATE -->
                <div class="mb-4">

                    <label class="form-label">
                        Ngày sinh
                    </label>

                    <input type="date"
                           name="birthDate"
                           class="form-control"
                           th:value="${user.birthDate}">

                </div>

                <button type="submit"
                        class="btn btn-primary">
                    Cập nhật
                </button>

            </form>

            <p class="text-success mt-3"
               th:text="${success}">
            </p>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
