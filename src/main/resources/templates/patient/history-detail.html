<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết bệnh án</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .sidebar-wrapper{
            position:fixed;
            width:260px;
            height:100vh;
            left:0;
            top:0;
        }

        .main-content{
            margin-left:260px;
            padding:40px;
        }

        .card{
            border:none;
            border-radius:20px;
        }

    </style>

</head>
<body>

<div class="sidebar-wrapper">

    <div th:replace="~{fragments/patient-sidebar :: sidebar}">
    </div>

</div>

<div class="main-content">

    <div class="card shadow p-5">

        <h2 class="text-primary mb-4">
            Chi tiết bệnh án
        </h2>

        <div class="mb-4">

            <h5>Triệu chứng</h5>

            <p th:text="${record.symptoms}">
            </p>

        </div>

        <div class="mb-4">

            <h5>Chẩn đoán</h5>

            <p th:text="${record.diagnosis}">
            </p>

        </div>

        <div class="mb-4">

            <h5>Đơn thuốc</h5>

            <table class="table table-bordered">

                <thead>

                <tr>

                    <th>Tên thuốc</th>

                    <th>Số lượng</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="d : ${record.prescription.details}">

                    <td th:text="${d.medicine.name}">
                    </td>

                    <td th:text="${d.quantity}">
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
