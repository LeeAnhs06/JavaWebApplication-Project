<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body {
            background: #f4f7fb;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .sidebar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            z-index: 1000;
            overflow-y: auto;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            min-height: 100vh;
        }

        .dashboard-title {
            font-weight: bold;
            color: #0d6efd;
        }

        .dashboard-card {
            border: none;
            border-radius: 20px;
            transition: 0.3s;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            margin-bottom: 20px;
        }

        @media (max-width: 992px) {
            .sidebar-wrapper {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }
        }

    </style>

</head>
<body>

<div class="sidebar-wrapper">
    <div th:replace="fragments/patient-sidebar :: sidebar"></div>
</div>

<div class="main-content">

    <h2 class="dashboard-title mb-5">
        Patient Dashboard
    </h2>

    <div class="row g-4">

        <!-- PROFILE -->
        <div class="col-md-4">
            <div class="card shadow dashboard-card p-4">
                <div class="icon-box bg-primary">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h4>Hồ sơ cá nhân</h4>
                <p class="text-muted">Cập nhật thông tin cá nhân.</p>
                <a href="/patient/profile" class="btn btn-primary">Quản lý</a>
            </div>
        </div>

        <!-- APPOINTMENT -->
        <div class="col-md-4">
            <div class="card shadow dashboard-card p-4">
                <div class="icon-box bg-success">
                    <i class="fa-solid fa-calendar-check"></i>
                </div>
                <h4>Đặt lịch khám</h4>
                <p class="text-muted">Đặt lịch với bác sĩ.</p>
                <a href="/patient/appointments" class="btn btn-success">Đặt lịch</a>
            </div>
        </div>

        <!-- HISTORY -->
        <div class="col-md-4">
            <div class="card shadow dashboard-card p-4">
                <div class="icon-box bg-warning">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </div>
                <h4>Lịch sử bệnh án</h4>
                <p class="text-muted">Xem lại các lần khám bệnh.</p>
                <a href="/patient/history" class="btn btn-warning text-white">Xem</a>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
