<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f4f7fb;
            margin:0;
        }

        .sidebar-wrapper{
            position:fixed;
            width:250px;
            height:100vh;
            left:0;
            top:0;
            z-index:1100;
        }

        .main-content{
            margin-left:250px;
            padding:40px;
            min-height:100vh;
        }

        .profile-card{
            border:none;
            border-radius:20px;
        }

        .profile-title{
            color:#0d6efd;
            font-weight:bold;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar-wrapper">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
</div>

<!-- CONTENT -->
<div class="main-content">

    <div class="card shadow profile-card">
        <div class="card-body p-5">

            <h2 class="profile-title mb-4">
                Admin Profile
            </h2>

            <div class="alert alert-success"
                 th:if="${success}"
                 th:text="${success}">
            </div>

            <div class="alert alert-danger"
                 th:if="${error}"
                 th:text="${error}">
            </div>

            <form action="/admin/profile/update"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">
                        Username
                    </label>

                    <input type="text"
                           class="form-control"
                           th:value="${user.username}"
                           readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Full Name
                    </label>

                    <input type="text"
                           name="fullName"
                           class="form-control"
                           th:value="${user.fullName}">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           th:value="${user.email}">
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Birth Date
                    </label>

                    <input type="date"
                           name="birthDate"
                           class="form-control"
                           th:value="${user.birthDate}">
                </div>

                <button class="btn btn-primary">
                    Update Profile
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
