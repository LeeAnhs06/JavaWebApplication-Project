<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medicine List</title>

    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <style>

        body {
            background: #f5f7fb;
        }

        .table-container {
            margin-top: 50px;
        }

        .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }

        .card-header {
            background: #111010;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
        }

        .table th {
            background: #0e0e0e;
            color: white;
            text-align: center;
        }

        .table td {
            vertical-align: middle;
            text-align: center;
        }

        .btn-action {
            width: 80px;
        }

    </style>

</head>
<body>

<div class="container table-container">

    <div class="card shadow">

        <div class="card-header d-flex justify-content-between align-items-center">

            <span>Medicine Management</span>

            <div>

                <a href="/admin/dashboard"
                   class="btn btn-secondary">
                    Back
                </a>

                <a href="/admin/medicines/add"
                   class="btn btn-light">
                    + Add Medicine
                </a>

                <a href="/logout"
                   class="btn btn-danger">
                    Logout
                </a>

            </div>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th width="220px">Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="m : ${list}">

                    <td th:text="${m.id}"></td>

                    <td th:text="${m.name}"></td>

                    <td th:text="${m.price}"></td>

                    <td th:text="${m.stock}"></td>

                    <td>

                        <a th:href="@{/admin/medicines/edit/{id}(id=${m.id})}"
                           class="btn btn-warning btn-sm btn-action">
                            Edit
                        </a>

                        <a th:href="@{/admin/medicines/delete/{id}(id=${m.id})}"
                           class="btn btn-danger btn-sm btn-action"
                           onclick="return confirm('Delete this medicine?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
