<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medicine Form</title>

    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <style>

        body {
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-card {
            width: 500px;
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }

        .card-header {
            background: #000000;
            color: white;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
        }

        .btn-save {
            height: 50px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }

    </style>

</head>
<body>

<div class="card shadow form-card">

    <div class="card-header">
        Medicine Form
    </div>

    <div class="card-body p-4">

        <form method="post"
              action="/admin/medicines/save">

            <!-- hidden id for edit -->
            <input type="hidden"
                   name="id"
                   th:value="${medicine.id}">

            <div class="mb-3">

                <label class="form-label">
                    Medicine Name
                </label>

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Enter medicine name"
                       th:value="${medicine.name}"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Stock
                </label>

                <input type="number"
                       name="stock"
                       class="form-control"
                       placeholder="Enter stock"
                       th:value="${medicine.stock}"
                       required>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Price
                </label>

                <input type="number"
                       name="price"
                       class="form-control"
                       placeholder="Enter price"
                       th:value="${medicine.price}"
                       required>

            </div>

            <button class="btn btn-secondary w-100 btn-save">
                Save Medicine
            </button>
            <p class="text-danger mt-3"
               th:text="${error}">
            </p>

        </form>

        <a href="/admin/medicines"
           class="btn btn-secondary w-100 mt-3">
            Back
        </a>

    </div>

</div>

</body>
</html>
