<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Loại xét nghiệm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f4f7fb;
            margin:0;
        }

        .sidebar-wrapper{
            position:fixed;
            width:250px;
            height:100vh;
            left:0;
            top:0;
            z-index:1100;
        }

        .main-content{
            margin-left:250px;
            padding:40px;
            min-height:100vh;
            overflow-x:auto;
        }

        .card{
            border:none;
            border-radius:20px;
        }

        .page-title{
            font-weight:bold;
            color:#0d6efd;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar-wrapper">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
</div>

<!-- CONTENT -->
<div class="main-content">

    <h2 class="page-title mb-4">
        Loại xét nghiệm
    </h2>

    <div class="card shadow">
        <div class="card-body p-4">

            <div class="table-responsive">
                <table class="table table-bordered table-hover bg-white">
                    <thead class="table-dark">
                    <tr>
                        <th width="80px">#</th>
                        <th>Tên loại xét nghiệm</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="t, iter : ${testTypes}">
                        <td th:text="${iter.count}"></td>
                        <td th:text="${t}"></td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(testTypes)}">
                        <td colspan="2" class="text-center text-muted py-4">
                            Chưa có dữ liệu
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <a href="/admin/dashboard" class="btn btn-secondary">
                Back
            </a>

        </div>
    </div>

</div>

</body>
</html>
