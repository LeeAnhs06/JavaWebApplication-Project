<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách khám bệnh</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
        }

        .sidebar-wrapper{
            position:fixed;
            width:250px;
            height:100vh;
            left:0;
            top:0;
        }

        .main-content{
            margin-left:250px;
            padding:40px;
        }

        .card{
            border:none;
            border-radius:20px;
        }

    </style>

</head>
<body>

<div class="sidebar-wrapper">

    <div th:replace="~{fragments/doctor-sidebar :: sidebar}">
    </div>

</div>

<div class="main-content">

    <div class="card shadow p-4">

        <h2 class="text-primary mb-4">
            Danh sách bệnh nhân chờ khám
        </h2>

        <table class="table table-bordered table-hover">

            <thead class="table-primary">

            <tr>
                <th>ID</th>
                <th>Bệnh nhân</th>
                <th>Ngày khám</th>
                <th>Giờ khám</th>
                <th>Triệu chứng</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="a : ${appointments}">

                <td th:text="${a.id}"></td>

                <td th:text="${a.patient.fullName}"></td>

                <td th:text="${a.appointmentDate}"></td>

                <td th:text="${a.appointmentTime}"></td>
                <td th:text="${a.symptoms}"></td>

                <td>

                    <a th:href="@{/doctor/examine/{id}(id=${a.id})}"
                       class="btn btn-success">

                        Khám bệnh

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
