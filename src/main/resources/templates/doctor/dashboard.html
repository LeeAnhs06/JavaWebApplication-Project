<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body {
            background: #f4f7fb;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .sidebar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            z-index: 1000;
            overflow-y: auto;
        }

        .main-content {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
        }

        .dashboard-title {
            font-weight: bold;
            color: #0d6efd;
        }

        .dashboard-card {
            border: none;
            border-radius: 20px;
            transition: 0.3s;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            margin-bottom: 20px;
        }

        @media (max-width: 992px) {

            .sidebar-wrapper {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

        }

        @media (max-width: 768px) {

            .main-content {
                padding: 15px;
            }

        }

    </style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar-wrapper">

    <div th:replace="~{fragments/doctor-sidebar :: sidebar}">
    </div>

</div>

<!-- CONTENT -->

<div class="main-content">

    <h2 class="dashboard-title mb-5">
        Doctor Dashboard
    </h2>

    <div class="row g-4">

        <!-- PROFILE -->

        <div class="col-md-4">

            <div class="card shadow dashboard-card p-4">

                <div class="icon-box bg-primary">

                    <i class="fa-solid fa-user-doctor"></i>

                </div>

                <h4>
                    Hồ sơ cá nhân
                </h4>

                <p class="text-muted">
                    Quản lý thông tin bác sĩ.
                </p>

                <a href="/doctor/profile"
                   class="btn btn-primary">

                    Quản lý

                </a>

            </div>

        </div>

        <!-- APPOINTMENTS -->

        <div class="col-md-4">

            <div class="card shadow dashboard-card p-4">

                <div class="icon-box bg-success">

                    <i class="fa-solid fa-users"></i>

                </div>

                <h4>
                    Danh sách chờ khám
                </h4>

                <p class="text-muted">
                    Xem bệnh nhân đang chờ khám.
                </p>

                <a href="/doctor/appointments"
                   class="btn btn-success">

                    Xem

                </a>

            </div>

        </div>

        <!-- PRESCRIPTION -->

        <div class="col-md-4">

            <div class="card shadow dashboard-card p-4">

                <div class="icon-box bg-danger">

                    <i class="fa-solid fa-file-medical"></i>

                </div>

                <h4>
                    Kê đơn thuốc
                </h4>

                <p class="text-muted">
                    Nhập kết quả khám và kê đơn.
                </p>

                <a href="/doctor/appointments"
                   class="btn btn-danger">

                    Quản lý

                </a>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
