<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cấp phát thuốc</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{ background:#f4f7fb; }
        .sidebar-wrapper{ position:fixed; width:250px; height:100vh; left:0; top:0; }
        .main-content{ margin-left:250px; padding:40px; }
        .card{ border:none; border-radius:20px; }
        .badge{ padding:10px 14px; font-size:14px; }
        @media(max-width:768px){
            .sidebar-wrapper{ position:relative; width:100%; height:auto; }
            .main-content{ margin-left:0; padding:20px; }
        }
    </style>
</head>
<body>

<div class="sidebar-wrapper">
    <div th:replace="~{fragments/doctor-sidebar :: sidebar}"></div>
</div>

<div class="main-content">
    <div class="card shadow p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="text-primary m-0">Đơn thuốc chờ cấp phát</h2>
            <a href="/doctor/prescriptions" class="btn btn-secondary">Làm mới</a>
        </div>

        <!-- Flash messages -->
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Bệnh nhân</th>
                <th>Thuốc</th>
                <th>Trạng thái</th>
                <th width="220px">Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${prescriptions}">
                <td th:text="${p.id}"></td>

                <td th:text="${p.medicalRecord.appointment.patient.fullName}"></td>

                <td>
                    <!-- Lưu ý: p.details có thể null nếu fetch LAZY, nhưng bạn đang getPendingPrescriptions()
                         Thực tế ổn nhất là dùng prescriptionService.getDetails(p) ở controller.
                         Nếu vẫn dùng p.details mà lỗi lazy, báo mình. -->
                    <div th:each="d : ${p.details}">
                        <span class="fw-semibold" th:text="${d.medicine.name}"></span>
                        -
                        <span th:text="${d.quantity}"></span>
                    </div>
                </td>

                <td>
                    <span class="badge bg-warning" th:if="${p.status == 'PENDING'}">PENDING</span>
                    <span class="badge bg-success" th:if="${p.status == 'DISPENSED'}">DISPENSED</span>
                </td>

                <td>
                    <form method="post"
                          th:action="@{/doctor/prescriptions/dispense/{id}(id=${p.id})}">
                        <button class="btn btn-success"
                                th:disabled="${p.status != 'PENDING'}">
                            Xác nhận phát thuốc
                        </button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(prescriptions)}">
                <td colspan="5" class="text-center text-muted py-4">
                    Không có đơn thuốc nào đang chờ cấp phát
                </td>
            </tr>

            </tbody>
        </table>
    </div>
</div>

</body>
</html>
