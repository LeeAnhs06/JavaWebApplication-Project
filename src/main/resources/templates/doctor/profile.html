<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        body{
            background:#f4f7fb;
            overflow-x:hidden;
            margin:0;
            padding:0;
        }

        .sidebar-wrapper{
            position:fixed;
            top:0;
            left:0;
            width:260px;
            height:100vh;
            z-index:1000;
            overflow-y:auto;
        }

        .main-content{
            margin-left:260px;
            padding:40px;
            min-height:100vh;
        }

        .profile-card{
            border:none;
            border-radius:20px;
        }

        .profile-title{
            color:#0d6efd;
            font-weight:bold;
        }

        @media (max-width: 992px){

            .sidebar-wrapper{
                position:relative;
                width:100%;
                height:auto;
            }

            .main-content{
                margin-left:0;
                padding:20px;
            }

        }

        @media (max-width: 768px){

            .main-content{
                padding:15px;
            }

        }

    </style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar-wrapper">

    <div th:replace="~{fragments/doctor-sidebar :: sidebar}">
    </div>

</div>

<!-- MAIN CONTENT -->

<div class="main-content">

    <h2 class="profile-title mb-5">
        Doctor Profile
    </h2>

    <div class="card shadow profile-card">

        <div class="card-body p-5">

            <form method="post"
                  action="/doctor/profile/update">

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input type="text"
                           class="form-control"
                           th:value="${user.username}"
                           readonly>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input type="text"
                           name="fullName"
                           class="form-control"
                           th:value="${user.fullName}">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           th:value="${user.email}">

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Birth Date
                    </label>

                    <input type="date"
                           name="birthDate"
                           class="form-control"
                           th:value="${user.birthDate}">

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Update Profile

                </button>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
